<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=402,initial-scale=1"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:402px;min-height:874px;background:#0A0A0F;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{font-size:44px;margin-bottom:10px}
.logo-title{font-size:28px;font-weight:800;color:#fff;letter-spacing:-0.5px}
.logo-sub{color:#FF6B00;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.card{background:#111118;border:1px solid #22222E;border-radius:24px;padding:32px 28px;width:100%}
.card-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.card-sub{font-size:13px;color:#8888A0;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{color:#AAAACC;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:7px}
.field-wrap{background:#16161F;border:1px solid #2A2A3A;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:10px}
.field-icon{font-size:18px;color:#8888A0}
.field-wrap input{background:none;border:none;outline:none;color:#fff;font-size:14px;flex:1;font-family:inherit}
.field-wrap.active{border-color:#FF6B00;background:#1A1410}
.forgot{text-align:right;color:#FF6B00;font-size:12px;margin-top:-8px;margin-bottom:20px;font-weight:600}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,#FF6B00,#FF9500);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:0.5px}
.divider{display:flex;align-items:center;gap:12px;margin:22px 0}
.divider-line{flex:1;height:1px;background:#22222E}
.divider-text{color:#555566;font-size:12px}
.google-btn{width:100%;padding:14px;background:#16161F;border:1px solid #2A2A3A;border-radius:14px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px}
.signup-row{text-align:center;margin-top:22px;font-size:13px;color:#8888A0}
.signup-row span{color:#FF6B00;font-weight:600}
</style></head><body>
<div class="logo">
  <div class="logo-icon">🎯</div>
  <div class="logo-title">CareerVerse</div>
  <div class="logo-sub">AI Career Guidance</div>
</div>
<div class="card">
  <div class="card-title">Welcome back 👋</div>
  <div class="card-sub">Sign in to continue your journey</div>
  <div class="field">
    <label>Email Address</label>
    <div class="field-wrap active">
      <span class="field-icon">✉️</span>
      <input type="email" value="rahul.sharma@gmail.com" readonly>
    </div>
  </div>
  <div class="field">
    <label>Password</label>
    <div class="field-wrap">
      <span class="field-icon">🔒</span>
      <input type="password" value="••••••••" readonly>
    </div>
  </div>
  <div class="forgot">Forgot Password?</div>
  <button class="btn">Sign In</button>
  <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>
  <button class="google-btn"><span>🌐</span> Continue with Google</button>
  <div class="signup-row">Don't have an account? <span>Sign up free</span></div>
</div>
</body></html>
