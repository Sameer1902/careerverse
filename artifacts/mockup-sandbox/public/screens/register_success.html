<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:402px;height:874px;background:#0A0A0F;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;padding:28px;position:relative}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center}
.bg-screen{position:absolute;inset:0;background:linear-gradient(180deg,#0A0A0F 0%,#111118 100%);display:flex;flex-direction:column;padding:60px 28px 0;gap:16px}
.bg-card{background:#16161F;border:1px solid #22222E;border-radius:16px;height:70px}
.popup{background:#111118;border:1px solid #FF6B0033;border-radius:28px;padding:40px 32px;width:100%;max-width:320px;text-align:center;position:relative;z-index:2;box-shadow:0 0 60px rgba(255,107,0,0.15)}
.checkmark{width:80px;height:80px;background:linear-gradient(135deg,#FF6B00,#FF9500);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px}
.popup h2{font-size:22px;font-weight:800;color:#fff;margin-bottom:8px}
.popup p{font-size:13px;color:#8888A0;line-height:1.6;margin-bottom:22px}
.user-chip{display:flex;align-items:center;gap:10px;background:#16161F;border:1px solid #22222E;border-radius:12px;padding:10px 14px;margin-bottom:22px}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#FF6B00,#FF9500);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.user-info{text-align:left}
.user-name{color:#fff;font-size:13px;font-weight:600}
.user-email{color:#8888A0;font-size:11px}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#FF6B00,#FF9500);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.skip{color:#8888A0;font-size:12px;margin-top:14px}
.skip span{color:#FF6B00}
</style></head><body>
<div class="bg-screen">
  <div class="bg-card"></div>
  <div class="bg-card"></div>
  <div class="bg-card"></div>
</div>
<div class="overlay">
  <div class="popup">
    <div class="checkmark">🎉</div>
    <h2>Welcome Aboard!</h2>
    <p>Your CareerVerse account has been created successfully. Let's find your perfect career path!</p>
    <div class="user-chip">
      <div class="avatar">R</div>
      <div class="user-info">
        <div class="user-name">Rahul Sharma</div>
        <div class="user-email">rahul.sharma@gmail.com</div>
      </div>
    </div>
    <button class="btn">🚀 Start Career Assessment</button>
    <div class="skip">or <span>explore careers first</span></div>
  </div>
</div>
</body></html>
